name: Python SDK Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e .

    - name: Print Dependency Versions
      run: |
        python -c "import pydantic, mcp, sys; print('Python version:', sys.version); print('Pydantic version:', pydantic.__version__); print('mcp version:', mcp.__version__ if hasattr(mcp, '__version__') else 'unknown')"

    - name: Run Integration Tests
      run: |
        python tests/test_basic.py
        python tests/test_tasks.py
        python tests/test_initial_tool.py
